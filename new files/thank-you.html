<body class="thank-you-page">


    
    <section class="story-name-section"></section>

    <!-- Thank-you popup -->
    <button type="button" class="thankyou-modal-close" id="thankyouCloseBtn" aria-label="Close">×</button>
    <div class="thankyou-modal-backdrop" id="thankyouModal" role="dialog" aria-modal="true" aria-label="Thank you">
        <div class="thankyou-modal">
            <h2 class="thankyou-title">THANK YOU FOR SUBMITTING AN INQUIRY.</h2>
            <p class="thankyou-subtitle">Our team will contact you shortly.</p>

    <!-- THINGS TO DO SECTION -->
  <!-- Footer Section -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const modal = document.getElementById("thankyouModal");
            const closeBtn = document.getElementById("thankyouCloseBtn");
            if (!modal || !closeBtn) return;

            function close() {
                modal.classList.remove("is-open");
                closeBtn.style.display = "none";
                document.body.style.overflow = "";
            }

            function open() {
                modal.classList.add("is-open");
                closeBtn.style.display = "inline-flex";
                document.body.style.overflow = "hidden";
            }

            closeBtn.addEventListener("click", close);
            modal.addEventListener("click", function (e) {
                if (e.target === modal) close();
            });
            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape") close();
            });

            // Show popup immediately on page load
            open();
        })();
    </script>
