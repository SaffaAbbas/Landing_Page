    html, body {

    /* Side navigation on the right */
    .side-nav {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 1000;
        top: 0;
        right: 0;
        background-color: white;
        overflow-x: hidden;
        transition: 0.4s ease;
        padding-top: 80px;
        box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
    }

    .side-nav-content {
        margin-top: 60px;
        padding-right: 30px;
        padding-left: 10px;
    }



    .side-nav-content a {
        padding: 14px 20px;
        text-decoration: none;
        font-size: 18px;
        color: #69443C;
        display: block;
        text-align: right;
        font-family: 'Neue Montreal', sans-serif;
        transition: all 0.3s ease;
    }

    .side-nav-content a:hover {
        text-decoration: underline;
        /* Dark gray on hover, optional */
        background-color: rgba(255, 255, 255, 0.15);
        color: #4fa3a5;
        padding-right: 40px;
    }

    .side-nav-content a:active,

    /* Keyboard focus */
    .side-nav-content a:focus {
        background-color: rgba(255, 255, 255, 0.15);
        color: #69443C;
        text-decoration: underline;
    }

    .side-nav-content a:hover,
    .side-nav-content a:active,
    .side-nav-content a:focus,
    .side-nav-content a:focus-visible {
        text-decoration: underline;
        background-color: rgba(255, 255, 255, 0.15);
        color: #4fa3a5;
        padding-right: 40px;
    }

    @media (min-width: 768px) {
        .side-nav-content {
            margin-top: 48px;
            padding-right: 22px;
            padding-left: 8px;
        }

        .side-nav-content a {
            padding: 10px 16px;
            line-height: 1.35;
        }

        .side-nav-content a:hover,
        .side-nav-content a:active,
        .side-nav-content a:focus,
        .side-nav-content a:focus-visible {
            padding-right: 32px;
        }
    }

    /* Mobile: smaller menu text + tighter spacing */
    @media (max-width: 767px) {
        .side-nav {
            padding-top: 56px;
        }

        .side-nav-content {
            margin-top: 12px;
            padding-right: 6px;
            padding-left: 0;
        }

        .side-nav-content a {
            font-size: 15px;
            line-height: 1.25;
            padding: 5px 4px;
        }

        .side-nav-content a:hover,
        .side-nav-content a:active,
        .side-nav-content a:focus,
        .side-nav-content a:focus-visible {
            padding-right: 4px !important;
        }

        /* Menu button text */
        #menuBtn {
            font-size: 14px;
            padding: 4px 6px;
        }
    }

    .menu-btn {
        background: #ffffff;
        border: none;
        padding: 6px 14px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        cursor: pointer;
        font-size: 16px;
        font-family: 'Nunito', sans-serif;
    }

    .menu-btn.text-active {
        color: #d1b183;
    }

    .menu-btn.text-active {
        background: #fff;
